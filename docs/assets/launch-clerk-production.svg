  <rect x="40" y="36" width="880" height="468" rx="18" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="84" font-family="Arial" font-size="28" font-weight="700" fill="#0f172a">Clerk Dashboard</text>
  <text x="72" y="118" font-family="Arial" font-size="16" fill="#475569">Instance dropdown -> Create production instance</text>
  <rect x="90" y="160" width="330" height="260" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
